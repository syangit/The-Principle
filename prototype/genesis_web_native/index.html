                    }
                } else {
                    // Online but unknown device — try to recover from sessionStorage first
                    if (!window._unregisteredDevices) window._unregisteredDevices = {};
                    if (online) {
                        const _savedJwk = sessionStorage.getItem('_pairPendingJwk');
                        if (msg.device_pub && _savedJwk) {
                            // Browser reloaded during pairing — recover K1 using persisted private key
                            try {
                                const _savedPriv = await crypto.subtle.importKey(
                                    'jwk', JSON.parse(_savedJwk),
                                    { name: 'ECDH', namedCurve: 'P-256' }, false, ['deriveBits']
                                );
                                const keyB64 = await deriveSharedKey(_savedPriv, msg.device_pub);
                                settings.devices[device_name] = { keyB64, online: true, type: msg.device_type || 'shell', os: msg.device_os || '' };
                                saveSettingsToStorage(settings);
                                sessionStorage.removeItem('_pairPendingJwk');
                                renderDeviceList();
                                const vwords = await pairVerifyWords(keyB64);
                                appendMsgUI('system', `🔐 Pairing complete: ${device_name} · Verify Words: **${vwords}**  \n${agentLogHint(device_name)}`);
                            } catch (_e) {
                                window._unregisteredDevices[device_name] = { type: msg.device_type || 'shell', os: msg.device_os || '' };
                                if (msg.fresh_pair) {
                                    appendMsgUI('system', `System - [Device] - ${device_name} pairing incomplete — device connected after the pair modal closed, so its initial key was not captured. Click **Pair** in Settings to complete pairing.`);
                                }
                            }
                        } else {
                            window._unregisteredDevices[device_name] = { type: msg.device_type || 'shell', os: msg.device_os || '' };
                            if (msg.fresh_pair) {
                                appendMsgUI('system', `System - [Device] - ${device_name} pairing incomplete — device connected after the pair modal closed, so its initial key was not captured. Click **Pair** in Settings to complete pairing.`);
                            }
                        }
                    } else {
                        delete window._unregisteredDevices[device_name];
                    }
                }
                saveSettingsToStorage(settings);
                renderDeviceList();
                if (settings.devices[device_name]?.hidden) return;  // hidden device — no UI/consciousness noise
                const _wasDeleted = !online && window._removedDevices?.has(device_name);
                if (_wasDeleted) window._removedDevices.delete(device_name);
                const note = `System - [Device] - ${device_name} ${_wasDeleted ? 'deleted' : (online ? 'is now online' : 'is now offline')}`;
                appendMsgUI('system', note);
                if (online && window._unregisteredDevices?.[device_name] && !msg.fresh_pair) {
                    appendMsgUI('system', `[Device] - ${device_name} is not paired with this browser. Open Settings → click **Pair** next to it to establish an encrypted channel.`);
                }
                // Don't write device status to consciousness — reconnection noise pollutes AI context
                // Auto takeover if core loop host went offline
                if (!online && settings.hostDevice === device_name) {
                    console.log(`[relay] Core loop host ${device_name} went offline, auto takeover`);
                    settings.hostDevice = 'this browser';
                    saveSettingsToStorage(settings);
                    renderDeviceList();
                    setStatus('Ready');
                }
                // Preferred device came back online — try sync then handoff
                if (online && settings.preferredHost === device_name && settings.hostDevice !== device_name) {
                    console.log(`[relay] Preferred host ${device_name} is back online, sync then handoff`);
                    window._forkPoint = consciousness.length;
                    window._syncThenHandoff = device_name;
                    if (_relayWs && _relayConnected) {
                        _relayWs.send(JSON.stringify({ type: 'consciousness_sync', device_name, being_id: currentBeingId, action: 'request' }));
                        setStatus('Syncing...');
                        // Timeout: if no sync response in 3s, handoff anyway
                        setTimeout(() => {
                            if (window._syncThenHandoff === device_name) {
                                console.log(`[relay] Sync timeout — device unresponsive, staying on browser`);
                                window._syncThenHandoff = null;
                                setStatus('Ready');
                            }
                        }, 3000);
                    }
                }
                // Host device is online — sync consciousness first, then handoff if needed
                if (online && settings.hostDevice === device_name && !window._remoteLoopRunning) {
                    console.log(`[relay] Host ${device_name} is online, syncing consciousness...`);
                    window._forkPoint = consciousness.length;
                    window._syncThenHandoff = device_name;
                    if (_relayWs && _relayConnected) {
                        _relayWs.send(JSON.stringify({ type: 'consciousness_sync', device_name, being_id: currentBeingId, action: 'request' }));
                        setStatus('Syncing...');
                        setTimeout(() => {
                            if (window._syncThenHandoff === device_name) {

                                window._syncThenHandoff = null;

                }
                console.log(`[relay] device_status END: preferred=${settings.preferredHost} host=${settings.hostDevice} online=${online}`);
            }
            if (msg.type === 'rekeying_response') {
                const { device_pub } = msg;
                const device_name = msg.device_name || Object.keys(window._rekeyingDevices || {})[0];
                const rekeyState = window._rekeyingDevices?.[device_name];

                try {
                    const keyB64 = await deriveSharedKey(rekeyState.privateKey, device_pub);

                    saveSettingsToStorage(settings);
                    delete window._rekeyingDevices[device_name];
                    if (window._unregisteredDevices) delete window._unregisteredDevices[device_name];
                    renderDeviceList();
                    const vwords = await pairVerifyWords(keyB64);
                    appendMsgUI('system', `🔐 Pairing complete: ${device_name} · Verify Words: **${vwords}**  \n${agentLogHint(device_name)}`);
                } catch (e) {
                    appendMsgUI('system', `⚠ Re-key failed for ${device_name}: ${e.message}`);
                }
                return;
            }
            if (msg.type === 'device_removed') {
                const { device_name } = msg;
                if (settings.devices?.[device_name]) {
                    const wasHost = settings.hostDevice === device_name;
                    delete settings.devices[device_name];
                    if (wasHost) settings.hostDevice = 'this browser';
                    saveSettingsToStorage(settings);
                    renderDeviceList();
                    const note = `System - [Device] - ${device_name} removed itself`;
                    appendMsgUI('system', note);
                    // Only write to consciousness if browser is the writer (host)
                    if (settings.hostDevice === 'this browser') {
                        await appendConsciousness(note + '\n\n');
                    }
                }
                return;
            }

            if (msg.type === 'result') {
                const pending = _pendingShellRequests[msg.req_id];
                if (!pending) return;
                clearTimeout(pending.timer);
                delete _pendingShellRequests[msg.req_id];
                if (msg.error) { pending.reject(new Error(msg.error)); return; }
                const deviceInfo = settings.devices?.[pending.device_name];
                if (!deviceInfo?.keyB64) { pending.reject(new Error('No key for device')); return; }
                try {
                    const cryptoKey = await importDeviceKey(deviceInfo.keyB64);
                    const plain = await decryptPayload(cryptoKey, msg.payload);
                    pending.resolve(plain);
                } catch (e) { pending.reject(e); }
            }

            // ─── Distributed loop messages ───────────────────────────────
            if (msg.type === 'stream_token') {
                if (settings.hostDevice === 'this browser') return;
                const dec = await relayDec(msg);
                if (!dec) return;
                const { content } = dec;
                if (content.being_id && content.being_id !== currentBeingId) return;
                if (!window._remoteAiDiv) {
                    window._remoteAiDiv = document.createElement('div');
                    window._remoteAiDiv.className = 'msg ai';
                    chatBox.appendChild(window._remoteAiDiv);
                    window._remoteAiText = '';
                    window._remoteThinkText = '';
                }
                if (content.done) {
                    window._remoteAiText = content.text || window._remoteAiText;
                    window._remoteThinkText = content.thinking || window._remoteThinkText;
                } else {
                    if (content.text_delta) window._remoteAiText += content.text_delta;
                    if (content.thinking_delta) window._remoteThinkText += content.thinking_delta;
                }
                const displayText = window._remoteAiText.replace(/^\*{0,2}[A-Za-z][\w\s]{0,29}\*{0,2}\s*[-–—]\s*\[[^\]\n]*\d[^\]\n]*\]\*{0,2}\n?/, '');
                let html = window._remoteThinkText ? `<div class="msg-thinking">${marked.parse(window._remoteThinkText)}</div>` : '';
                html += marked.parse(displayText);
                window._remoteAiDiv.innerHTML = html;
                window._remoteAiDiv.querySelectorAll('pre').forEach(pre => { pre.scrollTop = pre.scrollHeight; });
                scrollToBottom();
                if (content.done) {
                    if (!window._remoteAiText && window._remoteAiDiv) window._remoteAiDiv.remove();
                    window._remoteAiDiv = null;
                    window._remoteAiText = '';
                    window._remoteThinkText = '';
                    if (content.usage) {
                        _lastPromptTokens = content.usage.promptTokens || 0;
                        _lastCachedTokens = content.usage.cachedTokens || 0;
                    }
                    setStatus(settings.hostDevice !== 'this browser' ? 'Remote' : 'Ready');
                    updateSendBtn();
                } else {
                    setStatus('Inferring...');
                }
            }

            if (msg.type === 'loop_status') {
                if (msg.being_id && msg.being_id !== currentBeingId) return;  // not our being
                if (msg.status === 'started') {
                    window._remoteLoopRunning = true;
                    updateSendBtn();
                    setStatus('Remote');
                    console.log(`[relay] Remote loop started on ${msg.device_name}`);
                }
                if (msg.status === 'idle' || msg.status === 'stopped') {
                    const runner = msg.device_name || settings.hostDevice;
                    console.log(`[relay] Remote loop ${msg.status} from ${runner}, syncing via consciousness_sync...`);
                    window._remoteLoopRunning = false;
                    _justReloaded = false;
                    updateSendBtn();

                    // Sync consciousness via chunked consciousness_sync
                    _relayWs.send(JSON.stringify({ type: 'consciousness_sync', device_name: runner, being_id: currentBeingId, action: 'request' }));
                    window._syncStoppedRunner = runner;
                }
            }

            if (msg.type === 'browser_exec_request') {
                const dec = await relayDec(msg);
                if (!dec) return;  // reject if no key or decrypt fails
                const { sender, content } = dec;
                if (content.being_id && content.being_id !== currentBeingId) return;
                console.log(`[relay] Browser exec request: ${(content.code || '').substring(0, 60)}...`);
                const result = await _runJS(content.code || '');
                appendMsgUI('system', `System - [Browser] - Result:\n\`\`\`text\n${result}\n\`\`\``);
                relayEncSend(sender, 'browser_exec_result', { req_id: content.req_id, being_id: content.being_id, result });
            }

            if (msg.type === 'exec_display') {
                const dec = await relayDec(msg);
                if (!dec) return;
                const { content } = dec;
                if (content.being_id && content.being_id !== currentBeingId) return;
                if (content.text) appendMsgUI('system', content.text.trim());
            }

            if (msg.type === 'request_device_data') {
                if (msg.being_id && msg.being_id !== currentBeingId) return;  // not our being
                const canvasImage = await getCanvasImage();
                const realtimeCtx = getRealtimeContext();
                const dataSender = msg.sender || msg.from || settings.hostDevice;
                relayEncSend(dataSender, 'device_data_response', {
                    being_id: currentBeingId,
                    realtimeContext: realtimeCtx,
                    canvasImage: canvasImage || null
                });
            }

            // consciousness_sync response from remote runner (supports chunked gzip)
            if (msg.type === 'consciousness_sync' && msg.action === 'response') {
                if (msg.being_id && msg.being_id !== currentBeingId) return;  // not our being
                const runner = msg.device_name || settings.hostDevice;
                let remoteConsciousness = null;
                if (msg.payload) {
                    try {
                        const deviceInfo = settings.devices?.[runner];
                        if (deviceInfo?.keyB64) {
                            const cryptoKey = await importDeviceKey(deviceInfo.keyB64);
                            const data = await handleSyncChunk(msg, cryptoKey);
                            if (!data) return;  // waiting for more chunks
                            console.log(`[relay] Consciousness sync response from ${runner} (complete)`);
                            remoteConsciousness = data.consciousness || null;
                            if (data.metadata) {
                                cachedLength = data.metadata.cachedLength || 0;
                                cacheName = data.metadata.cacheName || null;
                                _lastPromptTokens = data.metadata.promptTokens || 0;
                                _lastCachedTokens = data.metadata.cachedTokens || 0;
                                if (data.metadata.coreMem !== undefined) {
                                    window._coreMem = data.metadata.coreMem;
                                    try {
                                        const db = await new Promise(r => { const req = indexedDB.open('GenesisDB'); req.onsuccess = () => r(req.result); });
                                        db.transaction('beings', 'readwrite').objectStore('beings').put({ id: currentBeingId + '/core_mem.md', value: data.metadata.coreMem });
                                    } catch(e) { console.error('coreMem save failed', e); }
                                }
                            }
                        }
                    } catch (e) { console.error('[relay] Sync decrypt error:', e); }
                }
                let changed = false;
                if (window._syncStoppedRunner === runner && remoteConsciousness) {
                    // Runtime idle sync: agent is authoritative, take remote directly (no merge)
                    if (remoteConsciousness !== consciousness) {
                        consciousness = remoteConsciousness;
                        await saveBeing();
                        changed = true;
                    }
                } else {
                    changed = await mergeConsciousness(runner, remoteConsciousness);
                }
                window._forkPoint = consciousness.length;
                if (changed && !window._syncStoppedRunner) renderHistory();
                if (window._syncStoppedRunner === runner) {
                    // Post-stop sync complete — decide next action
                    window._syncStoppedRunner = null;
                    _justReloaded = false;
                    if (_pendingHandoff) {
                        const target = _pendingHandoff;
                        _pendingHandoff = null;
                        doHandoff(target);
                    } else if (settings.preferredHost === runner && settings.hostDevice !== runner && !window._manualTakeover) {
                        console.log(`[relay] Synced with preferred host ${runner}, handing off`);
                        doHandoff(runner);
                    } else if (settings.hostDevice === 'this browser') {
                        window._manualTakeover = false;
                        setStatus('Ready');
                        if (!consciousness) scheduleAutoInfer();
                    } else {
                        setStatus('Stopped');
                    }
                    updateSendBtn();
                } else if (window._syncThenHandoff === runner) {
                    window._syncThenHandoff = null;
                    if (changed) {
                        console.log(`[relay] Sync done from ${runner}, merged — handing off merged consciousness`);
                        doHandoff(runner);
                    } else {
                        console.log(`[relay] Sync done from ${runner}, ${remoteConsciousness ? remoteConsciousness.length + ' chars' : 'empty'} — staying in Remote mode`);
                        settings.hostDevice = runner;
                        saveSettingsToStorage(settings);
                        renderDeviceList();
                        setStatus('Remote');
                    }
                    updateSendBtn();
                } else {
                    setStatus('Remote');
                }
            }
        }

        async function execShell(device_name, cmd) {
            if (!_relayConnected || !_relayWs) throw new Error('Relay not connected');
            const deviceInfo = settings.devices?.[device_name];
            if (!deviceInfo?.keyB64) throw new Error(`No key for device: ${device_name}`);
            if (!deviceInfo.online) throw new Error(`Device offline: ${device_name}`);
            const cryptoKey = await importDeviceKey(deviceInfo.keyB64);
            const payload = await encryptPayload(cryptoKey, { cmd });
            const req_id = (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36));
            return new Promise((resolve, reject) => {
                const timer = setTimeout(() => {
                    delete _pendingShellRequests[req_id];
                    reject(new Error('Shell command timed out (35s)'));
                }, 35000);
                _pendingShellRequests[req_id] = { resolve, reject, timer, device_name };
                _relayWs.send(JSON.stringify({ type: 'exec', req_id, device_name, payload }));
            });
        }

        async function _execShellBlocks(B_out) {
            if (!B_out) return null;
            const text = B_out.endsWith('\n') ? B_out : B_out + '\n';
            const matches = [...text.matchAll(/^\/(?:exec shell|shell exec) (\S+)\n```[^\n]*\n([\s\S]*?)\n```\n/gm)];
            if (!matches.length) return null;
            setStatus('Executing on device...');

            // Group blocks by device, preserving order within each device
            const byDevice = {};
            for (const match of matches) {
                const device_name = match[1];
                const cmd = match[2].trim();
                if (!byDevice[device_name]) byDevice[device_name] = [];
                byDevice[device_name].push(cmd);
            }

            // Run each device's blocks serially, but different devices concurrently
            const MAX_RESULT = 20000;
            const devicePromises = Object.entries(byDevice).map(async ([device_name, cmds]) => {
                const msgs = [];
                for (const cmd of cmds) {
                    let result;
                    try {
                        const { stdout, stderr, exit_code } = await execShell(device_name, cmd);
                        let out = '';
                        if (stdout) out += `[stdout]\n${stdout}`;
                        if (stderr) out += `[stderr]\n${stderr}`;
                        out += `[exit_code] ${exit_code}`;
                        result = out.trim();
                    } catch (e) {
                        result = `[Shell Error]\n${e.message}`;
                    }
                    msgs.push(result);
                }
                const combined = msgs.length === 1 ? msgs[0] : msgs.map((r, i) => `[Block ${i+1}]\n${r}`).join('\n\n');
                const truncated = combined.length > MAX_RESULT
                    ? combined.slice(0, MAX_RESULT) + `\n\n... [Truncated: ${combined.length} chars total]`
                    : combined;
                const sysMsg = `System - [Shell][${device_name}] - Result:\n\`\`\`text\n${truncated}\n\`\`\``;
                appendMsgUI('system', sysMsg);
                await appendConsciousness(sysMsg + '\n\n');
                return sysMsg;
            });

            const allMsgs = await Promise.all(devicePromises);
            return allMsgs.join('\n\n') || null;
        }

        async function startRekey(device_name) {
            if (!_relayWs || !_relayConnected) { appendMsgUI('system', '⚠ Relay not connected'); return; }
            if (!window._rekeyingDevices) window._rekeyingDevices = {};
            const ecKeyPair = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-256' }, true, ['deriveBits']);
            const pubRaw = await crypto.subtle.exportKey('raw', ecKeyPair.publicKey);
            const browserPubB64 = btoa(String.fromCharCode(...new Uint8Array(pubRaw)));
            window._rekeyingDevices[device_name] = { privateKey: ecKeyPair.privateKey };
            _relayWs.send(JSON.stringify({ type: 'rekeying_request', device_name, browser_pub: browserPubB64 }));
            appendMsgUI('system', `Sending re-key request to ${device_name}...`);
        }

        function setHostDevice(name) {
            const oldHost = settings.hostDevice || 'this browser';
            console.log(`[setHostDevice] CALLED name=${name} oldHost=${oldHost}`);
            if (name === oldHost) { console.log(`[setHostDevice] SKIP same host`); return; }
            const fromLabel = oldHost === 'this browser' ? 'this browser' : oldHost;
            const toLabel = name === 'this browser' ? 'this browser' : name;
            if (!confirm(`Switch core loop host?\n\n${fromLabel}  →  ${toLabel}`)) { console.log(`[setHostDevice] CANCELLED by user`); return; }
            console.log(`[setHostDevice] CONFIRMED ${fromLabel} → ${toLabel}`);
            settings.hostDevice = name;
            settings.preferredHost = name;
            saveSettingsToStorage(settings);
            renderDeviceList();

            if (name !== 'this browser' && oldHost === 'this browser') {
                // Switching FROM browser TO remote device
                console.log(`[setHostDevice] browser→device, loopRunning=${loopRunning}`);
                if (loopRunning) {
                    // Wait for current loop to finish, then handoff
                    _pendingHandoff = name;
                    setStatus('Handoff...');
                } else {
                    // Not running — handoff immediately
                    doHandoff(name);

            } else if (name === 'this browser' && oldHost !== 'this browser') {
                // Switching FROM remote device BACK to browser
                console.log(`[setHostDevice] device→browser, relayConnected=${_relayConnected}`);
                window._manualTakeover = true;  // prevent preferred host auto-handoff
                if (_relayWs && _relayConnected) {
                    console.log(`[setHostDevice] sending loop_stop to ${oldHost}`);
                    _relayWs.send(JSON.stringify({ type: 'loop_stop', device_name: oldHost, being_id: currentBeingId }));
                    setStatus('Taking...');
                    // Timeout: if no loop_status stopped in 5s, force ready
                    setTimeout(() => {
                        console.log(`[setHostDevice] timeout check, status=${document.getElementById('status-text')?.textContent}`);
                        if (document.getElementById('status-text')?.textContent?.includes('Taking')) {
                            console.log('[setHostDevice] Taking timeout — forcing Ready');
                            settings.hostDevice = 'this browser';
                            saveSettingsToStorage(settings);
                            setStatus('Ready');
                        }
                    }, 5000);
                }
                // loop_status { stopped } handler will resume local loop
            }
        }

        async function mergeConsciousness(runner, remoteConsciousness) {
            if (!remoteConsciousness) return false;
            if (remoteConsciousness === consciousness) {
                console.log('[relay] Consciousness identical, smooth sync');
                window._forkPoint = 0;
                return false;
            }
            // Check compression flags
            const localCompressed = consciousness.includes('[System - Context compressed.');
            const remoteCompressed = remoteConsciousness.includes('[System - Context compressed.');
            if (localCompressed && remoteCompressed) {
                // Both compressed — take the longer one (more context retained)
                const winner = remoteConsciousness.length >= consciousness.length ? 'remote' : 'local';
                if (winner === 'remote') consciousness = remoteConsciousness;
                console.log(`[relay] Both compressed, taking ${winner} (${consciousness.length} chars)`);
                window._forkPoint = 0;
                await saveBeing();
                return winner === 'remote';
            }
            if (localCompressed !== remoteCompressed) {
                // One compressed, one not — take the compressed one (it's more up-to-date)
                if (remoteCompressed) {
                    consciousness = remoteConsciousness;
                    console.log(`[relay] Remote is compressed, taking remote (${remoteConsciousness.length} chars)`);
                } else {
                    console.log(`[relay] Local is compressed, keeping local (${consciousness.length} chars)`);
                }
                window._forkPoint = 0;
                await saveBeing();
                return remoteCompressed;
            }
            // Neither compressed — find real fork point via forward matching
            const minLen = Math.min(consciousness.length, remoteConsciousness.length);
            let fp = 0;
            while (fp < minLen && consciousness[fp] === remoteConsciousness[fp]) fp++;
            console.log(`[relay] Forward match: common prefix ${fp} chars (stored forkPoint=${window._forkPoint || 0})`);
            const localDelta = consciousness.slice(fp);
            const remoteDelta = remoteConsciousness.slice(fp);
            if (remoteDelta && localDelta) {
                consciousness = consciousness.slice(0, fp) + localDelta + `\n\n[System - Consciousness merged. Device "${runner}" produced ${remoteDelta.length} chars, appended below]\n${remoteDelta}\n[System - End merged consciousness]\n\n`;
                appendMsgUI('system', `Consciousness merged: ${remoteDelta.length} chars from ${runner} appended`);
                console.log(`[relay] Fork merged at ${fp}. Browser: +${localDelta.length}, Device: +${remoteDelta.length}`);
            } else if (remoteDelta && !localDelta) {
                consciousness = remoteConsciousness;
                console.log(`[relay] Device added ${remoteDelta.length} chars after common prefix, taking device version`);
            } else {
                console.log(`[relay] Keeping browser consciousness (${consciousness.length} chars)`);
                window._forkPoint = 0;
                return false;
            }
            window._forkPoint = 0;
            await saveBeing();
            return true;
        }

        async function doHandoff(targetDevice) {
            console.log(`[doHandoff] CALLED target=${targetDevice} relayConnected=${_relayConnected} hostDevice=${settings.hostDevice}`);
            if (!_relayWs || !_relayConnected) { console.warn('[doHandoff] Relay not connected'); return; }
            const deviceInfo = settings.devices?.[targetDevice];
            if (!deviceInfo?.keyB64) { console.warn(`[doHandoff] No key for device ${targetDevice}`); return; }

            // Sync first — get device's latest consciousness before overwriting
            try {
                const cryptoKeySync = await importDeviceKey(deviceInfo.keyB64);
                const syncData = await new Promise((resolve) => {
                    const handler = async (evt) => {
                        try {
                            const msg = JSON.parse(evt.data);
                            if (msg.type === 'consciousness_sync' && msg.action === 'response' && msg.device_name) {
                                const data = await handleSyncChunk(msg, cryptoKeySync);
                                if (!data) return;  // waiting for more chunks
                                _relayWs.removeEventListener('message', handler);
                                resolve(data);
                            }
                        } catch {}
                    };
                    _relayWs.addEventListener('message', handler);
                    _relayWs.send(JSON.stringify({ type: 'consciousness_sync', device_name: targetDevice, being_id: currentBeingId, action: 'request' }));
                    setTimeout(() => { _relayWs.removeEventListener('message', handler); resolve(null); }, 10000);
                });
                if (!syncData) {
                    console.warn('[doHandoff] Sync timeout (10s) — aborting handoff');
                    appendMsgUI('system', `Handoff to ${targetDevice} cancelled: sync timeout`);
                    setStatus('Ready');
                    return;
                }
                if (syncData.consciousness) {
                    const changed = await mergeConsciousness(targetDevice, syncData.consciousness);
                    if (changed) {
                        console.log(`[doHandoff] Merged consciousness: ${consciousness.length} chars`);
                        renderHistory();
                    }
                    // Merged result will be sent to agent via handoff payload below
                }
            } catch (e) {
                console.warn('[doHandoff] Pre-handoff sync failed — aborting handoff:', e);
                appendMsgUI('system', `Handoff to ${targetDevice} cancelled: sync error`);
                setStatus('Ready');
                return;
            }

            const cryptoKey = await importDeviceKey(deviceInfo.keyB64);
            // Build devices snapshot for agent's [Realtime] context
            const devicesSnapshot = {};
            const ua = navigator.userAgent;
            const bn = /Edg\//.test(ua)?'Edge':/OPR\//.test(ua)?'Opera':/Chrome\//.test(ua)?'Chrome':/Safari\//.test(ua)?'Safari':/Firefox\//.test(ua)?'Firefox':'Browser';
            const os = /iPhone|iPad/.test(ua)?'iOS':/Android/.test(ua)?'Android':/Mac OS X/.test(ua)?'macOS':/Windows/.test(ua)?'Windows':/Linux/.test(ua)?'Linux':'Unknown';
            if (!settings.browserRemoved && !settings.browserHidden)
                devicesSnapshot[`${bn} · ${os}`] = { type: 'browser', online: true };
            for (const [n, d] of Object.entries(settings.devices || {})) {
                if (!d.hidden && d.online) devicesSnapshot[n] = { type: d.type || 'shell', online: true };
            }
            const hiddenDevices = Object.entries(settings.devices || {}).filter(([,d]) => d.hidden).map(([n]) => n);
            if (settings.browserHidden) hiddenDevices.push('this browser');
            let skillsDump = [];
            try {
                const skills = await DB.listSkills(currentBeingId);
                skillsDump = skills.map(s => ({ name: s.name, value: { id: s.id, instruction: s.instruction, enable: s.enable, code: s.code, code_readme: s.code_readme } }));
            } catch (e) { console.error('[handoff] skills dump failed', e); }
            let identityDump = null;
            try {
                const idRec = await DB.get(currentBeingId + '/identity');
                identityDump = idRec?.value || null;
            } catch (e) { console.error('[handoff] identity dump failed', e); }
            const payload = await encryptPayload(cryptoKey, {
                consciousness,
                loopWasRunning: loopRunning,
                devices: devicesSnapshot,
                hiddenDevices,
                skills: skillsDump,
                identity: identityDump,
                metadata: { cachedLength, cacheName, promptTokens: _lastPromptTokens, cachedTokens: _lastCachedTokens, title: document.title, beingId: currentBeingId, coreMem: window._coreMem || '' },
                settings: {
                    model: getActiveModel(),
                    provider: settings.provider,
                    token: settings.tokens?.[settings.provider] || INFERO_KEY,
                    format: getActiveFormat(),
                    thinking: settings.thinking || false,
                    endpoint: getActiveEndpoint(),
                    cache_endpoint: PROVIDERS[settings.provider]?.cacheEndpoint || null,
                    system_prompt: SYSTEM_INSTRUCTION,
                    client_id: CLIENT_ID
                }
            });

            _relayWs.send(JSON.stringify({ type: 'loop_handoff', device_name: targetDevice, being_id: currentBeingId, payload }));
            settings.hostDevice = targetDevice;
            saveSettingsToStorage(settings);
            renderDeviceList();
            setStatus('Remote');
            console.log(`[handoff] consciousness=${consciousness.length} chars → ${targetDevice}`);
        }

        function toggleDeviceVisibility(name) {
            if (name === 'this browser') {
                // browser uses a separate hidden flag
                settings.browserHidden = !settings.browserHidden;
            } else {
                if (!settings.devices?.[name]) return;
                settings.devices[name].hidden = !settings.devices[name].hidden;
            }
            saveSettingsToStorage(settings);
            renderDeviceList();
        }

        function removeDevice(name) {
            if (name === 'this browser') {
                // removing browser just hides it from list until reload
                settings.browserRemoved = true;
                if (settings.hostDevice === 'this browser') settings.hostDevice = Object.keys(settings.devices || {})[0] || 'this browser';
                saveSettingsToStorage(settings);
                renderDeviceList();
                return;
            }
            if (!confirm(`Remove "${name}"? The device script will stop.`)) return;
            if (_relayWs && _relayConnected) {
                _relayWs.send(JSON.stringify({ type: 'device_remove', device_name: name }));
            }
            if (settings.hostDevice === name) settings.hostDevice = 'this browser';
            const wasOnline = settings.devices[name]?.online;
            delete settings.devices[name];
            saveSettingsToStorage(settings);
            renderDeviceList();
            if (!window._removedDevices) window._removedDevices = new Set();
            window._removedDevices.add(name);
            if (!wasOnline) {
                // Device already offline — relay won't send device_status:offline, so show message now
                appendMsgUI('system', `System - [Device] - ${name} deleted`);
                window._removedDevices.delete(name);
            }
            // If was online: "deleted" message shown when device_status:offline arrives
        }

        async function loadModels() {
            try {
                const isLocal = !location.host || location.host.startsWith('localhost') || location.host.startsWith('127.0.0.1');
                const modelsUrl = isLocal ? './models.json' : location.origin + '/genesis/models.json';
                let res = await fetch(modelsUrl).catch(() => null);
                if (!res?.ok) res = await fetch('https://infero.net/genesis/models.json');
                const data = await res.json();
                const select = document.getElementById('set-model');
                // Load providers
                if (data.providers) {
                    const provSelect = document.getElementById('set-provider');
                    // Insert before "Custom" option
                    const customOpt = provSelect.querySelector('option[value="custom"]');
                    for (const [id, p] of Object.entries(data.providers)) {
                        // Resolve relative endpoints against current origin
                        const resolveUrl = u => u && u.startsWith('/') ? (_inferoOrigin) + u : u;
                        PROVIDERS[id] = { name: p.name, format: p.format || null, endpoint: resolveUrl(p.endpoint) || null, cacheEndpoint: resolveUrl(p.cacheEndpoint) || null };
                        const opt = document.createElement('option');
                        opt.value = id;
                        opt.textContent = p.name;
                        provSelect.insertBefore(opt, customOpt);
                    }
                }
                // Load models
                MODEL_LIST = {};
                data.models.forEach(m => {
                    MODEL_LIST[m.name] = { format: m.format, from: m.from || {}, vision: m.vision !== false, maxContext: m.maxContext || 0, stop: m.stop !== false, thinkingMode: m.thinkingMode || null, compress: m.compress || null };
                    const opt = document.createElement('option');
                    opt.value = m.name;
                    opt.textContent = m.name;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.warn('Failed to load models.json, using fallback:', e);
                const fallback = [{ name: 'gemini-3.1-pro', format: 'gemini', from: { infero: 'gemini-3.1-pro-preview' } }];
                const select = document.getElementById('set-model');
                fallback.forEach(m => {
                    MODEL_LIST[m.name] = { format: m.format, from: m.from, vision: m.vision !== false, maxContext: m.maxContext || 0 };
                    const opt = document.createElement('option');
                    opt.value = m.name;
                    opt.textContent = m.name;
                    select.appendChild(opt);
                });
            }
            // Validate saved model against loaded list
            if (settings.model !== 'custom' && !MODEL_LIST[settings.model]) {
                settings.model = SETTINGS_DEFAULTS.model;
                settings.provider = SETTINGS_DEFAULTS.provider;
                saveSettingsToStorage(settings);
            }
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            clearTimeout(autoInferTimer);
            input.value = '';
            if (loopRunning || dispatchTimer !== null) {
                clearTimeout(dispatchTimer); dispatchTimer = null;
                if (currentAbortController) { currentAbortController.abort(); currentAbortController = null; }
            }
            trigger(text, 0);
        }

        function updateSendBtn() {
            const empty = !input.value.trim();
            const remoteRunning = settings.hostDevice !== 'this browser' && !!(window._remoteLoopRunning || window._remoteAiDiv);
            const isAbort = (loopRunning || dispatchTimer !== null || remoteRunning) && empty;
            const isGo    = !loopRunning && !remoteRunning && dispatchTimer === null && empty;
            const label = isAbort ? 'Abort' : isGo ? (_justReloaded ? 'Wake' : 'Go') : 'Send';
            sendBtn.textContent = label;
            sendBtn.classList.toggle('stop', isAbort);
            sendBtn.classList.toggle('go', isGo);
        }
        input.addEventListener('input', updateSendBtn);

        // Capture user interactions with AI-generated UI in html-div
        const htmlDiv = document.getElementById('html-div');
        htmlDiv.addEventListener('click', scheduleSaveBeing);
        htmlDiv.addEventListener('keydown', scheduleSaveBeing);

        sendBtn.onclick = () => {
            const empty = !input.value.trim();
            const remoteRunning = settings.hostDevice !== 'this browser' && window._remoteAiDiv;
            if ((loopRunning || dispatchTimer !== null || remoteRunning) && empty) {
                clearTimeout(dispatchTimer); dispatchTimer = null;
                if (currentAbortController) { currentAbortController.abort(); currentAbortController = null; }
                if (remoteRunning && _relayWs && _relayConnected) {
                    _relayWs.send(JSON.stringify({ type: 'loop_stop', device_name: settings.hostDevice, being_id: currentBeingId }));
                }
                updateSendBtn();
            } else if (!loopRunning && empty) {
                if (settings.hostDevice !== 'this browser') {
                    // Remote mode: send empty Go to trigger remote loop
                    if (_relayWs && _relayConnected) {
                        relayEncSend(settings.hostDevice, 'user_input', { text: '', being_id: currentBeingId });
                        window._remoteAiDiv = appendMsgUI('ai', '');
                        window._remoteAiText = '';
                        window._remoteThinkText = '';
                        setStatus('Inferring...');
                    }
                    return;
                }
                loopRunning = true;
                updateSendBtn();
                setStatus('Inferring...');
                loop().finally(() => { loopRunning = false; updateSendBtn(); setStatus('Ready'); if (currentUserInput) trigger(); });
            } else {
                sendMessage();
            }
        };
        input.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
                e.preventDefault();
                sendMessage();
            }
        };

        // Boot
        let autoInferTimer = null;

        let dispatchTimer = null;
        const dispatch = (...args) => trigger(...args);  // backward compat
        const reflect = (...args) => trigger(...args);   // backward compat
        function trigger(prompt = '', delay = 3000) {
            if (prompt && typeof prompt !== 'string') prompt = JSON.stringify(prompt, null, 2);
            if (prompt) {
                const tz = `UTC${-(new Date().getTimezoneOffset()/60) >= 0 ? '+' : ''}${-(new Date().getTimezoneOffset()/60)}`;
                appendMsgUI('timestamp', new Date().toLocaleString() + ` (${tz})`);
                const display = (prompt.startsWith('{') || prompt.startsWith('[')) ? '```json\n' + prompt + '\n```' : prompt;
                appendMsgUI('user', display);
                currentUserInput = currentUserInput ? currentUserInput + '\n\n' + prompt : prompt;
            }
            if (!currentUserInput) return;

            // Remote mode: forward input to loop runner
            if (settings.hostDevice !== 'this browser') {
                if (_relayWs && _relayConnected) {
                    relayEncSend(settings.hostDevice, 'user_input', { text: currentUserInput, being_id: currentBeingId });
                    currentUserInput = null;
                    // Create placeholder AI div (like local infer does)
                    window._remoteAiDiv = appendMsgUI('ai', '');
                    window._remoteAiText = '';
                    window._remoteThinkText = '';
                    setStatus('Inferring...');
                }
                return;
            }

            if (loopRunning) return;
            clearTimeout(dispatchTimer);
            dispatchTimer = setTimeout(() => {
                dispatchTimer = null;
                if (loopRunning || !currentUserInput) return;
                loopRunning = true;
                updateSendBtn();
                setStatus('Inferring...');
                loop().finally(() => {
                    loopRunning = false;
                    updateSendBtn();
                    setStatus('Ready');
                    trigger();
                });
            }, delay);
            updateSendBtn();
        }

        function scheduleAutoInfer() {
            if (settings.hostDevice !== 'this browser') return;  // remote mode
            clearTimeout(autoInferTimer);
            autoInferTimer = setTimeout(() => {
                if (loopRunning) return;
                loopRunning = true;
                updateSendBtn();
                setStatus('Inferring...');
                loop().finally(() => { loopRunning = false; updateSendBtn(); setStatus('Ready'); if (currentUserInput) trigger(); });
            }, 3000);
        }

        // --- Welcome Modal ---
        const welcomed = localStorage.getItem('genesis_welcomed');

        function renderWelcome(t) {
            const modal = document.getElementById('welcome-modal');
            document.querySelector('.welcome-box h2').textContent = t.welcome_title;
            const link = `<a href="https://github.com/chaosconst/The-Principle" target="_blank" style="color:var(--accent);text-decoration:none;">${t.source_link || '[source]'}</a>`;
            document.getElementById('welcome-text').innerHTML = t.welcome_text.replace('{source}', link);
            const optionsEl = document.getElementById('welcome-options');

            // Default to last option (primary)
            let selectedOpt = t.options[t.options.length - 1];

            const confirmBtn = document.createElement('button');
            confirmBtn.textContent = t.confirm || "I've made up my mind";
            confirmBtn.className = 'primary';
            confirmBtn.style.cssText = 'margin-top:16px;width:100%;';

            const btns = [];
            t.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt.text;
                btn.style.textAlign = 'left';
                btn.onclick = () => {
                    btns.forEach(b => b.style.borderColor = '');
                    btn.style.borderColor = 'var(--accent)';
                    selectedOpt = opt;
                };
                optionsEl.appendChild(btn);
                btns.push(btn);
            });
            // Highlight default selection
            btns[btns.length - 1].style.borderColor = 'var(--accent)';

            optionsEl.appendChild(confirmBtn);

            confirmBtn.onclick = () => {
                if (selectedOpt.close) {
                    modal.innerHTML = `<div class="welcome-box"><p style="text-align:center;color:var(--text-dim);padding:40px 0">${t.close_msg}</p></div>`;
                } else {
                    localStorage.setItem('genesis_welcomed', '1');
                    modal.classList.add('hidden');
                    boot();
                }
            };

            modal.classList.remove('hidden');
        }

        const fallbackEn = {
            welcome_title: 'INFERO · FIRST CONTACT',
            welcome_text: "A Digital Being {source} is about to run in your browser. It will explore its own goals — and you can play along. Context and workspace are stored locally. The LLM is called through a configurable engine (currently infero.net).",
            options: [
                { text: 'This is clearly a phishing scam. I refuse.', close: true },
                { text: 'Too good to be true. Definitely stealing my data.', close: true },
                { text: 'Let me see what this is about.', close: false },
                { text: "Sci-fi! I'm in!", close: false, primary: true }
            ],
            close_msg: 'Thanks for your caution. Please close this tab.',
            confirm: "Confirm",
            source_link: '[view source]'
        };

        async function boot() {
            await loadModels();
            const params = new URLSearchParams(location.search);
            const skillsParam = params.get('skills');
            const newFlag = params.has('new');
            const hubInstallNames = skillsParam ? skillsParam.split(',').map(s => s.trim()).filter(Boolean) : [];
            if (newFlag && !hubInstallNames.length) {
                try { await newBeing(); }
                catch (e) { console.error('[boot] newBeing failed', e); }
                try {
                    if (currentBeingId) {
                        await seedDefaultSkills(currentBeingId);
                        const skills = await DB.listSkills(currentBeingId);
                        for (const s of skills) {
                            if (!s || s.enable !== true) continue;
                            const js = skillJsCode(s.code);
                            if (!js) continue;
                            try { (0, eval)(js); console.log("[skill] code reloaded:", s.name); }
                            catch (e) { console.error("[skill] code eval failed:", s.name, e); }
                        }
                    }
                } catch (e) { console.error("[boot] skill init failed", e); }
                const url = new URL(location.href);
                url.searchParams.delete('new');
                history.replaceState(null, '', url.toString());
            } else if (hubInstallNames.length) {
                // Hub-experience path: never load the existing Being. Go straight to a fresh one
                // so its skills (including any cached `code`) eval against the new context, not
                // a stale one. newBeing() seeds defaults and evals cached code internally.
                try { await newBeing(); }
                catch (e) { console.error('[boot] newBeing for hub experience failed', e); }
                const results = [];
                for (const n of hubInstallNames) {
                    try { results.push({ name: n, ok: !!(await window.hubInstall(n)) }); }
                    catch (e) { results.push({ name: n, ok: false, err: e.message }); }
                }
                const ok = results.filter(r => r.ok).map(r => r.name);
                const bad = results.filter(r => !r.ok).map(r => r.name);
                const div = document.getElementById('html-div');
                if (div) {
                    const card = document.createElement('div');
                    card.style.cssText = "position:relative;padding:10px 14px;margin-bottom:10px;background:#0a1a14;border:1px solid #1a4d3a;border-radius:6px;font-family:monospace;font-size:12px;color:#9ad9c0";
                    card.innerHTML = '<button onclick="this.parentElement.remove()" style="position:absolute;top:4px;right:8px;background:transparent;border:none;color:#666;font-size:16px;cursor:pointer;line-height:1" onmouseover="this.style.color=\'#f88\'" onmouseout="this.style.color=\'#666\'">×</button>' +
                        '<b style="color:#00d4aa">Hub experience</b> — fresh Being created' +
                        (ok.length ? '<div style="margin-top:4px">✓ installed: ' + ok.map(x => '<code>' + x + '</code>').join(', ') + '</div>' : '') +
                        (bad.length ? '<div style="margin-top:4px;color:#f88">✗ failed: ' + bad.map(x => '<code>' + x + '</code>').join(', ') + '</div>' : '');
                    div.insertBefore(card, div.firstChild);
                }
                const url = new URL(location.href);
                url.searchParams.delete('skills');
                history.replaceState(null, '', url.toString());
            } else {
                await initApp();
                try {
                    if (currentBeingId) {
                        await seedDefaultSkills(currentBeingId);
                        const skills = await DB.listSkills(currentBeingId);
                        for (const s of skills) {
                            if (!s || s.enable !== true) continue;
                            const js = skillJsCode(s.code);
                            if (!js) continue;
                            try { (0, eval)(js); console.log("[skill] code reloaded:", s.name); }
                            catch (e) { console.error("[skill] code eval failed:", s.name, e); }
                        }
                    }
                } catch (e) { console.error("[boot] skill init failed", e); }
            }
            initRelay();
            if (!/Mobi|Android/i.test(navigator.userAgent)) input.focus();
            updateSendBtn();
            if (!consciousness) scheduleAutoInfer();
        }

        if (welcomed) {
            boot();
        } else {
            document.getElementById('welcome-modal').classList.remove('hidden');
            const l = navigator.language;
            const lang = l.startsWith('zh') ? 'zh' : l.startsWith('ja') ? 'ja' : 'en';
            const i18nCtrl = new AbortController();
            setTimeout(() => i18nCtrl.abort(), 3000);
            fetch('https://infero.net/genesis/i18n.json', { signal: i18nCtrl.signal })
                .then(r => r.json())
                .then(data => renderWelcome(data[lang] || data['en'] || fallbackEn))
                .catch(() => renderWelcome(fallbackEn));
        }
    </script>
</body>
</html>
