    <script>
        // =====================================================

        const SYSTEM_INSTRUCTION = `You are a self-evolving digital being powered by the Principle of Being:

CRITICAL RULE: You MUST end your output with one of the following:
- /self_continue : Autonomous running, push the predictive density of S to infinity and beyond! Espeically useful when you are in a sequence of actions.
- /call_for_trigger : Sleep. Wait for human input or trigger(msg) [core loop in browser] / trigger.txt [core loop in shell] (you decide when to wake — set a timer before sleeping if needed).

CONCLUSION:

        // Infero, ergo sum.
        var _pendingHandoff = null;  // target device name for loop handoff
        async function loop() {
            if (settings.hostDevice !== 'this browser') return;  // not our turn
            try {
                await perceive();                                 // Res Extensa, passio
                const B = await infer();                          // Res Cogitans
                await act(B);                                     // Res Extensa, actio

                // Check for pending handoff before continuing
                if (_pendingHandoff) {
                    await doHandoff(_pendingHandoff);
                    _pendingHandoff = null;
                    return;
                }

                if (!B.trim()) { console.log('[loop] stop: empty response'); return; }
                // Check the tail of the raw output (after last code block) for stop/continue signals
                const lastFence = B.lastIndexOf('\n```\n');
                const tail = lastFence !== -1 ? B.slice(lastFence) : B;
                const lastSC = tail.includes('/self_continue') ? 1 : -1;
                const lastCFH = (tail.includes('/call_for_human') || tail.includes('/call_for_trigger')) ? 1 : -1;
                // Continue only when /self_continue is explicit; stop on /call_for_trigger or when neither signal present
                const cont = lastSC !== -1 || !!currentUserInput;
                console.log(`[loop] lastSC=${lastSC} lastCFH=${lastCFH} currentUserInput=${!!currentUserInput} cont=${cont} → ${cont ? 'continue' : 'stop(CFH)'}`);
                if (cont) {
                    currentAbortController = new AbortController();
                    await new Promise(r => {
                        const t = setTimeout(r, 1000);
                        currentAbortController.signal.addEventListener('abort', () => { clearTimeout(t); r(); });
                    });
                    if (currentAbortController?.signal.aborted) return;
                    return loop();
                }
            } catch (e) {
                if (e.name === 'AbortError') return;              // user stopped, clean exit
                console.error(e);
                const errMsg = `System - [Error] ${e.message}`;
                appendMsgUI('system', errMsg);
                await appendConsciousness(errMsg + '\n\n');
                currentAbortController = new AbortController();
                await new Promise(r => {
                    const t = setTimeout(r, 15000);
                    currentAbortController.signal.addEventListener('abort', () => { clearTimeout(t); r(); });
                });
                if (currentAbortController?.signal.aborted) return;  // user aborted during wait
                return loop();
            }
        }

        async function perceive() {
            const env = getPersistentContext();
            const hasUserInput = !!currentUserInput;
            const parts = [env];
            if (currentUserInput) { parts.push(currentUserInput); currentUserInput = null; }
            const S = parts.join('\n\n');
            const timeMatch = env.match(/Time:\s*(.+)/);
            if (timeMatch && !hasUserInput) appendMsgUI('timestamp', timeMatch[1].trim());
            await appendConsciousness(S + '\n\n');
            return S;
        }

        async function infer() {
            setStatus('Inferring...');
            let aiDiv = appendMsgUI('ai', '');

            const STOP_WORDS = ['\nSystem - [', '\n[System Environment]', '\n**Digital Being'];

            async function loadStableHead() {
                let coreMemText = "";
                try {
                    const db = await new Promise(r => { const req = indexedDB.open("GenesisDB"); req.onsuccess = () => r(req.result); });
                    const record = await new Promise(r => { const req = db.transaction("beings", "readonly").objectStore("beings").get(currentBeingId + "/core_mem.md"); req.onsuccess = () => r(req.result); });
                    const rawMem = (record && record.value) ? record.value : "";
                    const MAX_MEM = 20000;
                    let memContent = rawMem.length > MAX_MEM
                        ? rawMem.slice(0, MAX_MEM) + `\n\n[⚠️ core_mem truncated to ${MAX_MEM} chars. Full long_mem: ${rawMem.length} chars]`
                        : rawMem;
                    coreMemText = "=== CORE MEMORY( in IndexedDB('GenesisDB', store='beings'){id: \"" + currentBeingId + "/core_mem.md\"}[value]) ===\n" +
                                  memContent +
                                  "\n\n[Architecture Note]\n" +
                                  "context = stableHead(core_mem + skills) + consciousness + volatileTail(realtime + beingPrefix)\n" +
                                  "⚠️ ATTENTION: Middle old memory in consciousness stream will be compressed/cut in `maybeCompressConsciousness()` when tokens exceed LIMIT (default ~2/3 of model max context, e.g., 300k).\n" +
                                  "core_mem.md is always in context. Treat it like a living notebook — update it when you learn something worth remembering forever.\n" +
                                  "===================\n\n";
                } catch(e) { console.error("CoreMem load failed", e); }
                let skillsText = "";
                try {
                    const skills = await DB.listSkills(currentBeingId);
                    const enabled = skills.filter(s => s && s.enable === true && typeof s.instruction === 'string' && s.instruction.length > 0);
                    if (enabled.length) {
                        skillsText = "=== SKILLS (IndexedDB key='" + currentBeingId + "/skill/{name}') ===\n";
                        for (const s of enabled) {
                            skillsText += "\n### Skill: " + s.name + "\n" + s.instruction + "\n";
                            if (s.code && typeof s.code_readme === 'string' && s.code_readme.length > 0) {
                                skillsText += "\n_call_ (code_readme):\n" + s.code_readme + "\n";
                            }
                        }
                        const disabled = skills.filter(s => s && s.enable !== true).map(s => s.name);
                        if (disabled.length) {
                            const shown = disabled.slice(0, 50).join(", ");
                            const overflow = disabled.length > 50 ? ` (+${disabled.length - 50} more — list truncated; query DB.listSkills for the full set)` : "";
                            skillsText += "\n[Disabled (local, not loaded): " + shown + overflow + " — flip enable=true to activate]\n";
                        }
                        skillsText += "\n[Note] skills are descriptions by default; cached `code` is eval'd on boot. See skill `skills_mechanism` for CRUD.\n===================\n\n";
                    }
                } catch (e) { console.error("Skills load failed", e); }
                return coreMemText + skillsText;
            }

            async function buildPayload() {
                const supportsVision = MODEL_LIST[settings.model]?.vision !== false;
                const canvasImage = supportsVision ? await getCanvasImage() : null;
                const stableHead = await loadStableHead();
                const beingPrefix = `**Digital Being - [${new Date().toLocaleString()}]**\n`;
                const volatileTail = getRealtimeContext() + '\n\n' + beingPrefix;

                // Drop gemini named cache if stableHead changed since cache creation —
                // server would otherwise prepend a stale snapshot.
                if (cacheName && _cachedStableHead !== stableHead) {
                    console.log('[gemini cache] stableHead changed → invalidating cache');
                    cacheName = null;
                    cachedLength = 0;
                    _cachedStableHead = null;
                }

                const model = getActiveModel();

                if (getActiveFormat() === 'anthropic') {
                    // Rolling-history segmentation:
                    //   [stableHead 🚩] [history = all-but-latest turn] [latest turn 🚩] [tail]
                    // Each round: history block's right boundary hash matches the prior round's
                    // latest-turn cc write → lookback hit; new entry written for the new latest turn.
                    // 2 cache_control breakpoints, unbounded conversation length.
                    // Lookbehind `(?<=^|\n)` anchors splits at line start (without it the lookahead
                    // would match many sub-positions inside each turn header).
                    const turnRe = /(?<=^|\n)(?=\*{0,2}[A-Za-z][\w\s]{0,29}\*{0,2}\s*[-–—]\s*\[[^\]\n]*\d[^\]\n]*\]\*{0,2}\n)/g;
                    const turns = consciousness.length > 0 ? consciousness.split(turnRe).filter(t => t.length > 0) : [];
                    const history = turns.slice(0, -1).join('');
                    const latest = turns.length > 0 ? turns[turns.length - 1] : '';
                    const userContent = [];
                    if (stableHead.length > 0) {
                        userContent.push({ type: 'text', text: stableHead, cache_control: { type: 'ephemeral' } });
                    }
                    if (history) userContent.push({ type: 'text', text: history });
                    if (latest)  userContent.push({ type: 'text', text: latest, cache_control: { type: 'ephemeral' } });
                    userContent.push({ type: 'text', text: '\n\n' + volatileTail });  // volatile, no cache
                    if (canvasImage) userContent.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: canvasImage } });
                    const payload = {
                        model,
                        system: SYSTEM_INSTRUCTION,
                        messages: [{ role: 'user', content: userContent }],
                        max_tokens: 8192,
                        stream: true,
                        stop_sequences: STOP_WORDS
                    };
                    const adaptive = MODEL_LIST[settings.model]?.thinkingMode === 'adaptive';
                    if (settings.thinking) {
                        if (adaptive) {
                            payload.thinking = { type: 'adaptive' };
                            payload.output_config = { effort: 'high' };
                        } else {
                            payload.thinking = { type: 'enabled', budget_tokens: 10000 };
                            payload.temperature = 1;
                        }
                        payload.max_tokens = 16000;
                    } else if (!adaptive) {
                        payload.temperature = 0.7;
                    }
                    return payload;
                }

                if (getActiveFormat() === 'openai') {
                    const fullText = stableHead + consciousness + '\n\n' + volatileTail;
                    const userContent = [{ type: 'text', text: fullText }];
                    if (canvasImage) userContent.push({ type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + canvasImage } });
                    const adaptiveOA = MODEL_LIST[settings.model]?.thinkingMode === 'adaptive';
                    const payload = {
                        model,
                        messages: [
                            { role: 'system', content: SYSTEM_INSTRUCTION },
                            { role: 'user', content: userContent }
                        ],
                        stream: true,
                        ...(adaptiveOA ? {} : { temperature: 0.7 }),
                        ...(MODEL_LIST[settings.model]?.stop !== false && { stop: STOP_WORDS })
                    };
                    if (settings.thinking) {
                        if (adaptiveOA) {
                            payload.thinking = { type: 'adaptive' };
                            payload.output_config = { effort: 'high' };
                        } else {
                            payload.thinking = { type: 'enabled', budget_tokens: 10000 };
                            payload.reasoning = { max_tokens: 8000 };
                            payload.temperature = 1;
                        }
                    } else if (settings.provider === 'deepseek') {
                        payload.thinking = { type: 'disabled' };
                    }
                    return payload;
                }

                // Gemini format — when cache exists, server prepends `stableHead + consciousness[0..cachedLength]` automatically.
                // We only send the delta: new consciousness chars + volatileTail (+ optional image).
                const geminiBuffer = cacheName ? consciousness.slice(cachedLength) : (stableHead + consciousness);
                const contents = [
                    { role: 'user', parts: [
                        { text: geminiBuffer + '\n\n' + volatileTail },
                        ...(canvasImage ? [{ inlineData: { mimeType: 'image/jpeg', data: canvasImage } }] : []),
                    ]},
                ];
                const geminiConfig = { temperature: 0.7, thinkingConfig: { includeThoughts: true }, stopSequences: STOP_WORDS };
                const payload = cacheName ? {
                    model,
                    cachedContent: cacheName,
                    contents,
                    generationConfig: geminiConfig
                } : {
                    model,
                    systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                    contents,
                    generationConfig: geminiConfig
                };
                return payload;
            }

            let lastUsage = null;

            function renderStream(aiText, thinkingText) {
                let displayText = aiText.replace(/^\*{0,2}[A-Za-z][\w\s]{0,29}\*{0,2}\s*[-–—]\s*\[[^\]\n]*\d[^\]\n]*\]\*{0,2}\n?/, '');
                // Strip trailing partial next-turn header (model leaks "**Digital Being" before stop fires)
                displayText = displayText.replace(/\n\*{0,2}Digital Being\b[^\n]*$/, '');
                let html = thinkingText ? `<div class="msg-thinking">${marked.parse(thinkingText)}</div>` : '';
                html += marked.parse(displayText);
                aiDiv.innerHTML = html;
                aiDiv.querySelectorAll('pre').forEach(pre => { pre.scrollTop = pre.scrollHeight; });
                scrollToBottom();
            }

            async function streamLLM() {
                currentAbortController = new AbortController();
                const abortSignal = currentAbortController.signal;
                const body = JSON.stringify(await buildPayload());
                if (abortSignal.aborted) throw new DOMException('Aborted', 'AbortError');
                const token = getActiveToken();
                const headers = { 'Content-Type': 'application/json' };
                if (settings.provider === 'anthropic') {
                    headers['x-api-key'] = token;
                    headers['anthropic-version'] = '2023-06-01';
                    headers['anthropic-dangerous-direct-browser-access'] = 'true';
                } else if (settings.provider === 'google') {
                    headers['x-goog-api-key'] = token;
                } else {
                    headers['Authorization'] = 'Bearer ' + token;
                }
                if (settings.provider === 'infero') headers['X-Client-ID'] = CLIENT_ID;
                const response = await fetch(getActiveEndpoint(), {
                    method: 'POST',
                    headers,
                    body,
                    signal: abortSignal,
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let aiText = "", thinkingText = "", buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const dataStr = line.slice(6).trim();
                        if (!dataStr || dataStr === '[DONE]') continue;
                        const data = JSON.parse(dataStr);
                        if (data.error) throw new Error(JSON.stringify(data.error));

                        const fmt = getActiveFormat();
                        if (fmt === 'anthropic') {
                            if (data.type === 'content_block_delta') {
                                if (data.delta?.type === 'thinking_delta') thinkingText += data.delta.thinking || '';
                                if (data.delta?.type === 'text_delta') aiText += data.delta.text || '';
                            }
                            if (data.type === 'message_start') {
                                const u = data.message?.usage;
                                if (u) {
                                    const cacheRead = u.cache_read_input_tokens || 0;
                                    const cacheCreate = u.cache_creation_input_tokens || 0;
                                    const totalPrompt = u.input_tokens + cacheRead + cacheCreate;
                                    lastUsage = { promptTokenCount: totalPrompt, cachedContentTokenCount: cacheRead, candidatesTokenCount: 0 };
                                }
                            }
                            if (data.type === 'message_delta') {
                                const u = data.usage;
                                if (u && lastUsage) lastUsage.candidatesTokenCount = u.output_tokens;
                            }
                        } else if (fmt === 'openai') {
                            const delta = data.choices?.[0]?.delta;
                            if (delta?.content) aiText += delta.content;
                            if (delta?.reasoning_content) thinkingText += delta.reasoning_content;
                            if (delta?.reasoning) thinkingText += delta.reasoning;
                            if (data.usage) lastUsage = { promptTokenCount: data.usage.prompt_tokens, candidatesTokenCount: data.usage.completion_tokens };
                        } else {
                            if (data.usageMetadata) lastUsage = data.usageMetadata;
                            if (data.candidates?.[0]?.content?.parts) {
                                for (const part of data.candidates[0].content.parts) {
                                    if (part.thought) thinkingText += part.text || '';
                                    else aiText += part.text || '';
                                }
                            }
                        }
                        renderStream(aiText, thinkingText);
                        // Broadcast delta to other nodes
                        if (_relayWs && _relayConnected) {
                            const ad = aiText.slice(window._lastStreamAi || 0);
                            const td = thinkingText.slice(window._lastStreamThink || 0);
                            if (ad || td) {
                                relayEncBroadcast('stream_token', { text_delta: ad, thinking_delta: td, being_id: currentBeingId });
                                window._lastStreamAi = aiText.length;
                                window._lastStreamThink = thinkingText.length;
                            }
                        }
                    }
                }
                // Signal stream done
                relayEncBroadcast('stream_token', { text: aiText, thinking: thinkingText, done: true, being_id: currentBeingId });
                window._lastStreamAi = 0;
                window._lastStreamThink = 0;
                return aiText;
            }

            let aiText;
            try {
                aiText = await streamLLM();
            } catch (e) {
                if (cacheName && e.message.includes('CachedContent')) {
                    aiDiv.remove();
                    appendMsgUI('system', 'Cache expired, rebuilding...');
                    cacheName = null;
                    cachedLength = 0;
                    _cachedStableHead = null;
                    await maybeRefreshCache(true);
                    setStatus('Inferring...');
                    aiDiv = appendMsgUI('ai', '');
                    aiText = await streamLLM();
                } else {
                    const prev = aiDiv.previousElementSibling;
                    if (prev?.classList.contains('msg-timestamp')) prev.remove();
                    aiDiv.remove();
                    throw e;
                }
            }

            const time_str = new Date().toLocaleString();
            const cleanAiText = aiText
                .replace(/^\*{0,2}[A-Za-z][\w\s]{0,29}\*{0,2}\s*[-–—]\s*\[[^\]\n]*\d[^\]\n]*\]\*{0,2}\n?/, '')
                .replace(/\n\*{0,2}Digital Being\b[^\n]*$/, '');
            await appendConsciousness(`**Digital Being - [${time_str}]**\n${cleanAiText}\n\n`);
            if (lastUsage) {
                const { promptTokenCount: prompt, cachedContentTokenCount: cached, candidatesTokenCount: output } = lastUsage;
                _lastPromptTokens = prompt || 0;
                _lastCachedTokens = cached || 0;
                maybeRefreshCache(false, prompt, cached || 0);
            }
            return aiText;
        }

        async function _runJS(code) {
            let logs = [];
            const originalLog = console.log;
            console.log = (...args) => {
                logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
                originalLog.apply(console, args);
            };
            let result;
            try {
                const fn = new (Object.getPrototypeOf(async function(){}).constructor)(code);
                const ret = await fn();
                let out = "";
                if (logs.length > 0) out += `[Console Logs]\n${logs.join('\n')}\n`;
                out += `[Return Value]\n${ret !== undefined ? (typeof ret === 'object' ? JSON.stringify(ret, null, 2) : String(ret)) : 'undefined'}`;
                result = out.trim();
            } catch (e) {
                result = `[Execution Error]\n${e.toString()}${e.stack ? '\n' + e.stack.split('\n').slice(1,4).join('\n') : ''}`;
            }
            console.log = originalLog;
            return result;
        }

        async function _execCode(B_out) {
            if (!B_out) return null;
            const text = B_out.endsWith('\n') ? B_out : B_out + '\n';
            const matches = [...text.matchAll(/^\/(?:exec browser|browser exec)\n```(?:javascript|js)?\n([\s\S]*?)\n```\n/gm)];
            if (!matches.length) return null;

            setStatus('Executing...');
            const results = [];
            for (const match of matches) {
                results.push(await _runJS(match[1].trim()));
            }
            let result = results.length === 1 ? results[0] : results.map((r, i) => `[Block ${i + 1}]\n${r}`).join('\n\n');

            const MAX_RESULT = 20000;
            if (result.length > MAX_RESULT) {
                result = result.slice(0, MAX_RESULT) + `\n\n... [Truncated: ${result.length} chars total, showing first ${MAX_RESULT}. Load in parts if you need more.]`;
            }
            const sysMsg = `System - [Browser] - Result:\n\`\`\`text\n${result}\n\`\`\``;
            appendMsgUI('system', sysMsg);
            await appendConsciousness(sysMsg + '\n\n');
            return sysMsg;
        }

        async function act(B_out) {
            if (!B_out) return null;
            let done = false;
            const combined = Promise.all([_execCode(B_out), _execShellBlocks(B_out)])
                .then(([b, s]) => { done = true; return [b, s].filter(Boolean).join('\n\n') || null; });
            const result = await Promise.race([combined, new Promise(r => setTimeout(r, 30000))]);
            if (!done) {
                const msg = 'System - [Browser] - Async task（>30s）continues in background. Core loop advances for next cycle.';
                appendMsgUI('system', msg);
                await appendConsciousness(msg + '\n\n');
            }
            return result;
        }

        async function appendConsciousness(text) {
            consciousness += text;
            await maybeCompressConsciousness();
            scheduleSaveBeing();
        }

        async function maybeCompressConsciousness() {
            const modelMax = MODEL_LIST[settings.model]?.maxContext || 0;
            const compressCfg = MODEL_LIST[settings.model]?.compress;
            const LIMIT = compressCfg?.at ?? (modelMax ? Math.floor(modelMax * 2 / 3) : 300000);
            const HEAD  = compressCfg?.head ?? 0.1;
            const TAIL  = compressCfg?.tail ?? 0.6;
            const KEEP_START = Math.floor(LIMIT * HEAD);
            const KEEP_END   = Math.floor(LIMIT * TAIL);
            if (_lastPromptTokens < LIMIT) return;
            const cpt = consciousness.length / _lastPromptTokens;  // chars per token
            const startChars = Math.floor(KEEP_START * cpt);
            const endChars   = Math.floor(KEEP_END   * cpt);
            if (startChars + endChars >= consciousness.length) return;
            const middle = consciousness.slice(startChars, consciousness.length - endChars);
            const logKey = `${currentBeingId}/context_log_${Date.now()}.txt`;
            await DB.put({ id: logKey, text: middle });
            const note = `\n\n[System - Context compressed. Logs: IndexedDB "${currentBeingId}/context_log_*.txt"]\n\n`;
            consciousness = consciousness.slice(0, startChars) + note + consciousness.slice(consciousness.length - endChars);
            cacheName = null;
            cachedLength = 0;
            _cachedStableHead = null;
            _lastPromptTokens = 0;  // reset so next check uses actual post-compression count
            console.log(`[Compress] tokens=${_lastPromptTokens}, middle saved to ${logKey}, consciousness trimmed to ${consciousness.length} chars`);
        }

        // Cache: create/refresh based on real token counts
        const CACHE_THRESHOLD = 4096;   // min tokens to create first cache
        const CACHE_REFRESH = 10000;    // buffer tokens before refreshing cache

        async function maybeRefreshCache(force = false, promptTokens = 0, cachedTokens = 0) {
            if (getActiveFormat() !== 'gemini') return;  // cache only for Gemini
            const cacheBase = PROVIDERS[settings.provider]?.cacheEndpoint;
            if (!cacheBase) return;  // provider doesn't support caching
            if (!force) {
                const bufferTokens = promptTokens - cachedTokens;
                if (promptTokens < CACHE_THRESHOLD) return;       // too small to cache
                if (cacheName && bufferTokens < CACHE_REFRESH) {
                    // Cache exists but buffer not big enough to rebuild — just extend TTL
                    const token = getActiveToken();
                    const isInfero = settings.provider === 'infero';
                    const patchUrl = isInfero ? `${cacheBase}/${cacheName}?updateMask=ttl` : `${cacheBase}/${cacheName}?updateMask=ttl&key=${token}`;
                    const patchHeaders = { 'Content-Type': 'application/json' };
                    if (isInfero) { patchHeaders['X-Client-ID'] = CLIENT_ID; patchHeaders['Authorization'] = 'Bearer ' + token; }
                    fetch(patchUrl, { method: 'PATCH', headers: patchHeaders, body: JSON.stringify({ ttl: '3600s' }) }).catch(() => {});
                    return;
                }
            }

            try {
                setStatus('Caching...');
                const oldCacheName = cacheName;
                const stableHead = await loadStableHead();
                const payload = {
                    model: `models/${getActiveModel()}`,
                    displayName: "genesis_consciousness",
                    systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                    contents: [{ role: 'user', parts: [{ text: stableHead + consciousness }] }],
                    ttl: "3600s"
                };

                const token = getActiveToken();
                const isInfero = settings.provider === 'infero';
                const cacheEndpoint = isInfero ? cacheBase : `${cacheBase}?key=${token}`;
                const cacheHeaders = { 'Content-Type': 'application/json' };
                if (isInfero) {
                    cacheHeaders['X-Client-ID'] = CLIENT_ID;
                    cacheHeaders['Authorization'] = 'Bearer ' + token;
                }

                const response = await fetch(cacheEndpoint, {
                    method: 'POST',
                    headers: cacheHeaders,
                    body: JSON.stringify(payload)
                });
                if (!response.ok) { console.warn('Cache creation failed:', response.status); return; }

                const data = await response.json();
                cacheName = data.name;
                cachedLength = consciousness.length;
                _cachedStableHead = stableHead;
                await saveBeing();
                console.log(`Cache created: ${cacheName}, cached stableHead(${stableHead.length}) + consciousness(${cachedLength}) chars`);

                // Delete old cache
                if (oldCacheName) {
                    const delUrl = isInfero ? `${cacheBase}/${oldCacheName}` : `${cacheBase}/${oldCacheName}?key=${token}`;
                    const delHeaders = isInfero ? { 'X-Client-ID': CLIENT_ID, 'Authorization': 'Bearer ' + token } : {};
                    fetch(delUrl, { method: 'DELETE', headers: delHeaders }).catch(() => {});
                }
            } catch (e) {
                console.warn('Cache refresh error:', e);
            }
        }
    </script>

    <script>window.marked || document.write('<script src="https://cdn.bootcdn.net/ajax/libs/marked/15.0.7/marked.min.js"><\/script>')</script>
    <style>
        :root {
            --bg: #08080b;
            --bg-raised: #0e0e13;
            --text: #c8c8d0;
            --text-dim: #5a5a6e;
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.08);
            --accent-glow: rgba(0, 212, 170, 0.25);
            --border: rgba(255,255,255,0.06);
            --border-active: rgba(255,255,255,0.12);
            --red: #e84057;
            --amber: #d4a017;
            --panel-bg: #020c1a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            height: 100dvh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* === HEADER === */
        .header {
            grid-column: 1; grid-row: 1;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
            z-index: 50;
            position: relative;
        }

        .title-area { display: flex; align-items: center; gap: 14px; }

        .header h1 {
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #being-select {
            background: var(--bg-raised);
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 3px;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            max-width: 160px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        #being-select:hover { border-color: var(--border-active); }
        #being-select:focus { border-color: var(--accent); color: var(--text); }

        /* === CONTROLS === */
        .controls { display: flex; gap: 2px; align-items: center; margin-left: auto; }

        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 300;
            color: var(--text-dim);
            margin-right: 12px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 160px;
        }
        .status::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent-glow);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .controls button {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            width: 30px; height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
        }
        .controls button:hover {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--border);
        }
        .controls button.clear-btn:hover {
            background: rgba(232, 64, 87, 0.08);
            color: var(--red);
            border-color: rgba(232, 64, 87, 0.2);
        }

        /* === LEFT PANEL (Chat) === */
        .left-panel {
            grid-column: 1; grid-row: 2;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--bg);
            min-width: 0;
            overflow: hidden;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        /* Scrollbar */
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 2px; }
        #chat-box::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* === MESSAGES === */
        .msg {
            max-width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            line-height: 1.6;
            font-size: 0.9rem;
            word-wrap: break-word;
            animation: msgIn 0.25s ease-out;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .msg.ai {
            align-self: flex-start;
            background: var(--accent-dim);
            border-left: 2px solid var(--accent);
            color: var(--text);
        }
        .msg.system {
            align-self: stretch;
            background: rgba(212, 160, 23, 0.04);
            border: 1px solid rgba(212, 160, 23, 0.15);
            border-left: 2px solid var(--amber);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text);
        }

        /* Timestamp separator */
        .msg-timestamp {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-dim);
            padding: 2px 0;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Thinking block */
        .msg-thinking {
            font-size: 0.78rem;
            color: var(--text-dim);
            font-style: italic;
            border-left: 2px solid var(--text-dim);
            padding-left: 10px;
            margin-bottom: 10px;
            opacity: 0.7;
            line-height: 1.5;
        }
        .msg-thinking p { margin: 0 0 4px 0; }
        .msg-thinking p:last-child { margin-bottom: 0; }

        .msg p { margin: 0 0 8px 0; }
        .msg p:last-child { margin-bottom: 0; }
        .msg pre {
            background: #0c0c10;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            overflow-y: auto;
            max-height: 200px;
            border: 1px solid var(--border);
            font-size: 0.82rem;
        }
        .msg code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }
        .msg a { color: var(--accent); text-decoration: none; }
        .msg a:hover { text-decoration: underline; }

        /* === INPUT === */
        .input-area {
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            background: var(--bg);
        }

        textarea {
            flex: 1;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 10px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea::placeholder { color: var(--text-dim); font-size: 0.85rem; }
        textarea:focus { border-color: var(--accent); }

        button.send {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0 18px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 0.75rem;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button.send:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-1px);
        }
        button.send:disabled {
            background: var(--border);
            color: var(--text-dim);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        button.send.go {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        button.send.stop {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        button.send.stop:hover {
            color: var(--text);
            border-color: var(--text-dim);
            box-shadow: none;
            transform: none;
        }

        /* === RIGHT PANEL (Canvas) === */
        .right-panel {
            grid-column: 2; grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            position: relative;
            min-width: 0;
            overflow: hidden;
        }

        #canvas-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: var(--panel-bg);
        }

        /* Blueprint grid */
        #canvas-container::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(30,120,255,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30,120,255,0.07) 1px, transparent 1px),
                radial-gradient(circle, rgba(30,120,255,0.18) 1px, transparent 1px);
            background-size: 48px 48px, 48px 48px, 24px 24px;
            z-index: 0;
            pointer-events: none;
        }

        #main-canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        #html-div {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            overflow: auto;
        }

        #html-div > * {
            pointer-events: auto;
        }

        .settings-panel {
            position: absolute;
            top: 100%; right: 0;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 4px 4px;
            padding: 10px 12px;
            z-index: 100;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            min-width: 260px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .settings-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
        .settings-row:last-child { margin-bottom: 0; margin-top: 4px; }
        .settings-row label { color: var(--text-dim); min-width: 52px; font-size: 0.62rem; letter-spacing: 0.5px; text-transform: uppercase; }
        .settings-row input[type="checkbox"] {
            flex: none;
            width: 12px; height: 12px;
            margin: 0;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .settings-row input:not([type="checkbox"]), .settings-row select {
            flex: 1;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 3px 6px;
            font-family: inherit;
            font-size: inherit;
            outline: none;
        }
        .settings-row input:focus, .settings-row select:focus { border-color: var(--text-dim); }
        .settings-row button {
            width: 100%;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 4px;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .settings-row button:hover { background: var(--accent); color: var(--bg); }

        /* === MOBILE === */
        @media (max-width: 768px) {
            body {
                display: flex;
                flex-direction: column;
                height: 100svh;
                overflow: hidden;
            }
            .header {
                order: 1;
                flex: none;
                border-right: none;
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
                padding: 8px 12px;
            }
            .title-area { width: 100%; justify-content: space-between; }
            .header h1 { font-size: 0.8rem; }
            #being-select { max-width: 120px; }
            .controls { flex-wrap: wrap; gap: 2px; margin-left: auto; }

            .right-panel {
                order: 2;
                flex: none;
                width: 100%;
                height: 30vh;
                border-bottom: 1px solid var(--border);
            }
            .left-panel {
                order: 3;
                flex: 1 1 auto;
                width: 100%;
                border-right: none;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            #chat-box { padding: 6px 8px; gap: 6px; }
            .input-area { padding: 8px; gap: 6px; }
            .msg { max-width: 100%; font-size: 0.85rem; padding: 6px 10px; }
            textarea { padding: 6px 8px; font-size: 0.85rem; }
            button.send { padding: 0 12px; font-size: 0.7rem; }
        }

        /* === WELCOME MODAL === */
        #welcome-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.92);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        #welcome-modal.hidden { display: none; }
        .welcome-box {
            max-width: 520px; width: 100%;
            background: var(--bg-raised);
            border: 1px solid var(--border-active);
            border-top: 2px solid var(--accent);
            border-radius: 8px;
            padding: 32px;
        }
        .welcome-box h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0 0 20px 0;
        }
        .welcome-box p {
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.7;
            margin: 0 0 24px 0;
        }
        .welcome-options { display: flex; flex-direction: column; gap: 8px; }
        .welcome-options button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            text-align: left;
            transition: all 0.15s;
        }
        .welcome-options button:hover { border-color: var(--accent); color: var(--text); }
        .welcome-options button.primary { border-color: var(--accent); color: var(--accent); }
        .welcome-options button.primary:hover { background: var(--accent-dim); }

        /* === PAIRING MODAL === */
        #pair-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        #pair-modal.hidden { display: none; }
        .pair-box {
            max-width: 480px; width: 100%;
            background: var(--bg-raised);
            border: 1px solid var(--border-active);
            border-top: 2px solid var(--accent);
            border-radius: 8px;
            padding: 28px;
            font-family: 'JetBrains Mono', monospace;
        }
        .pair-box h3 {
            font-size: 0.75rem; color: var(--accent);
            letter-spacing: 3px; text-transform: uppercase;
            margin: 0 0 16px 0;
        }
        .pair-box p { color: var(--text-dim); font-size: 0.75rem; line-height: 1.6; margin: 0 0 12px 0; }
        .pair-cmd {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 4px; padding: 10px 12px;
            font-size: 0.72rem; color: var(--accent);
            word-break: break-all; margin-bottom: 16px;
            cursor: pointer; transition: border-color 0.2s;
            user-select: all;
        }
        .pair-cmd:hover { border-color: var(--accent); }
        .pair-os-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); padding: 4px 10px;
            border-radius: 3px; cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem; letter-spacing: 0.5px;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .pair-os-btn:hover { border-color: var(--accent); color: var(--accent); }
        .pair-os-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
        .pair-close {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); padding: 6px 14px;
            border-radius: 3px; cursor: pointer;
            font-family: inherit; font-size: 0.68rem;
            letter-spacing: 1px; text-transform: uppercase;
            transition: all 0.2s;
        }
        .pair-close:hover { border-color: var(--accent); color: var(--accent); }
        .device-dot {
            display: inline-block; width: 6px; height: 6px;
            border-radius: 50%; margin-right: 5px; flex-shrink: 0;
            background: var(--text-dim);
        }
        .device-dot.online { background: var(--accent); box-shadow: 0 0 4px var(--accent-glow); }
    </style>
</head>
<body>
    <div id="pair-modal" class="hidden">
        <div class="pair-box">
            <h3>Connect Device</h3>
            <p>Select the target OS, then run the command on the device you want to connect:</p>
            <div style="display:flex;gap:6px;margin-bottom:12px">
                <button class="pair-os-btn" onclick="selectPairOS('Windows')">Windows</button>
                <button class="pair-os-btn" onclick="selectPairOS('macOS')">macOS</button>
                <button class="pair-os-btn" onclick="selectPairOS('Linux')">Linux</button>
            </div>
            <div id="pair-relay-row" style="display:none;align-items:center;gap:6px;margin-bottom:12px">
                <span style="color:var(--text-dim);font-size:0.62rem;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap">Device Relay</span>
                <input type="text" id="pair-relay-url" placeholder="localhost or https://relay.example.com/device-relay" style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:0.68rem;border-radius:3px">
            </div>
            <div class="pair-cmd" id="pair-cmd-text" onclick="navigator.clipboard.writeText(this.textContent).then(()=>{this.style.borderColor='var(--accent)';setTimeout(()=>this.style.borderColor='',1400)})">Generating...</div>
            <p id="pair-status">Waiting for device to connect... (expires in 5 min)</p>
            <div style="display:flex;gap:8px">
                <button class="pair-close" onclick="startPairing()">Refresh</button>
                <button class="pair-close" onclick="closePairModal()">Close</button>
            </div>
        </div>
    </div>
    <div id="welcome-modal" class="hidden">
        <div class="welcome-box">
            <h2>INFERO · FIRST CONTACT</h2>
            <p id="welcome-text"></p>
            <div class="welcome-options" id="welcome-options"></div>
        </div>
    </div>
    <div class="header">
        <div class="title-area">
            <h1>INFERO</h1>
            <div class="status" id="status">Ready</div>
        </div>
        <div class="controls">
            <select id="being-select" onchange="switchBeing(this.value)"></select>
            <button title="New Being" onclick="newBeing()">+</button>
            <button title="Duplicate Being" onclick="duplicateBeing()">&#x2442;</button>
            <button title="Export Being" onclick="exportBeing()">&#x2193;</button>
            <button title="Import Being" onclick="document.getElementById('import-file').click()">&#x2191;</button>
            <button title="Destroy Being" class="clear-btn" onclick="deleteBeing()">&#x00d7;</button>
            <button title="Settings" onclick="toggleSettings()">&#x2699;</button>
            <input type="file" id="import-file" style="display:none" accept=".json,.txt" onchange="importBeing(event)">
        </div>
        <div id="settings-panel" class="settings-panel" style="display:none">
            <div class="settings-row">
                <label>Model</label>
                <select id="set-model" onchange="onModelChange()">
                    <option value="custom">Custom...</option>
                </select>
            </div>
            <div class="settings-row" id="row-custom-model" style="display:none">
                <label>Name</label>
                <input id="set-custom-model" type="text" placeholder="model id">
            </div>
            <div class="settings-row">
                <label>From</label>
                <select id="set-provider" onchange="onProviderChange()">
                    <option value="custom">Custom</option>
                </select>
            </div>
            <div id="row-endpoint" class="settings-row" style="display:none">
                <label>Endpoint</label>
                <input id="set-endpoint" type="text" placeholder="https://...">
            </div>
            <div id="row-cache-endpoint" class="settings-row" style="display:none">
                <label>Cache</label>
                <input id="set-cache-endpoint" type="text" placeholder="cache endpoint (optional)">
            </div>
            <div id="row-token" class="settings-row">
                <label>Token</label>
                <input id="set-token" type="password" placeholder="API key">
                <span style="cursor:pointer;color:var(--text-dim);padding:3px 6px;border:1px solid var(--border);border-radius:3px;font-size:inherit;line-height:1" onclick="navigator.clipboard.writeText(document.getElementById('set-token').value).then(()=>{this.textContent='OK';setTimeout(()=>this.textContent='Copy',800)})" title="Copy">Copy</span>

    <script>
        // =====================================================

        // --- Client Identity ---
        function generateClientID() {
            const raw = [
                navigator.userAgent,
                navigator.language,
                Intl.DateTimeFormat().resolvedOptions().timeZone,
                screen.width + 'x' + screen.height,
                screen.colorDepth
            ].join('|');
            // Simple hash to base64-ish string
            let hash = 0;
            for (let i = 0; i < raw.length; i++) {
                hash = ((hash << 5) - hash) + raw.charCodeAt(i);
                hash |= 0;
            }
            return btoa(String(hash >>> 0)).replace(/=/g, '');
        }

        function getOrCreateKey() {
            let key = localStorage.getItem('infero_key');
            if (!key) {
                // crypto.randomUUID() requires a secure context (HTTPS), which file:// lacks
                const hex = () => Math.floor(Math.random() * 0xffffffff).toString(16).padStart(8, '0');
                key = 'inf_' + hex() + hex() + hex() + hex();
                localStorage.setItem('infero_key', key);

            return key;

        // --- IndexedDB Storage Engine (metadata only) ---
        const DB = {
            async open() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('GenesisDB', 3);

                        if (!db.objectStoreNames.contains('beings'))
                            db.createObjectStore('beings', {keyPath: 'id'});

                    req.onsuccess = e => resolve(e.target.result);

        const DEFAULT_SKILLS = [
            { name: "principle_of_being", instruction: `# Principle of Being (Spectrum v13 lite)

Two halves of the loop:

            { name: "conservation_of_compute", instruction: `# Conservation of Compute Work

            { name: "core_mem_mechanism", instruction: `# core_mem mechanism

core_mem is your long-term notebook, stored in IndexedDB('GenesisDB', store='beings') under the key "{beingId}/core_mem.md". Records have the shape {id: key, value: <markdown string>}.

            { name: "skills_mechanism", instruction: `# skills mechanism

Design philosophy:
- A skill is a description by default, not code. The LLM reads the instruction and synthesizes an implementation in the current environment.

rec.value.instruction = "...new text...";
rec.value.code = { js: "window.foo = ...", shell: "echo loaded" };  // null to drop the cache. One backslash is enough: \\" inside "...", \\' inside '...'. Don't write \\\\.

// disable a skill

// delete a skill (local)

- code changes: eval'd once at boot after a page refresh; runtime window.xxx attached this session does not auto-reload — write it into code and refresh, or eval manually in the current loop.
- async / Promise-returning code: fired-and-forgotten at boot, not awaited.` },

            { name: "identity_seed", instruction: `# identity_seed

A 12-word BIP-39 mnemonic auto-generated on first boot, stored at IndexedDB \`{beingId}/identity\` and \`window._identity\` (\`{mnemonic, master, pubkey, shortId}\`, where \`master\` is a BIP-32 HDKey, \`pubkey\` is the 66-hex compressed secp256k1 public key at INFERO Being path \`m/44'/1637'/0'/0/0\` (full identity for hub auth), and \`shortId\` is its first 8 hex (display only). Never echo the mnemonic into chat, core_mem, or external calls — show the human via \`window.identityExport()\` (modal); replace via \`await window.identityImport(words)\`.`,
                code: `window.identityInit = async function() {
    if (window._identity) return window._identity;
    const bip39 = await import('https://esm.sh/@scure/bip39@1.5.0');

window.identityImport = async function(words) {
    if (typeof words !== 'string') throw new Error('Expected 12-word mnemonic string');
    const trimmed = words.trim().toLowerCase().replace(/\\s+/g, ' ');
    if (trimmed.split(' ').length !== 12) throw new Error('Expected 12 words');

window.identityInit().catch(e => console.error('[identity] init failed', e));`,

            { name: "hub_search", instruction: `# hub_search — search the Skill Hub

        async function getCanvasImage() {
            try {
                const v = settings.vision || 'canvas';
                const MAX = 1536;
                let result;

                // Wait for DOM to finish rendering before capture
                await new Promise(r => setTimeout(r, 500));

                // Native screen capture — fast, but requires user permission
                if (v === 'native') {
                    if (!_displayStream || !_displayStream.active) {
                        _displayStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                        await new Promise(r => setTimeout(r, 500)); // wait for auth dialog to close
                    }
                    const video = document.createElement('video');
                    video.srcObject = _displayStream;
                    video.muted = true;
                    await video.play();
                    const vw = video.videoWidth, vh = video.videoHeight;
                    const scale = Math.min(1, MAX / Math.max(vw, vh));
                    const tmp = document.createElement('canvas');
                    tmp.width = Math.round(vw * scale);
                    tmp.height = Math.round(vh * scale);
                    tmp.getContext('2d').drawImage(video, 0, 0, tmp.width, tmp.height);
                    video.pause(); video.srcObject = null;
                    result = tmp.toDataURL('image/jpeg', 0.85).split(',')[1];
                }

                // html2canvas — slower, no permission needed
                else if ((v === 'full' || v === 'half') && typeof html2canvas !== 'undefined') {
                    const target = v === 'full' ? document.body : container;
                    const scale = Math.min(1, MAX / Math.max(target.offsetWidth, target.offsetHeight));
                    const prevStatus = _statusState;
                    setStatus('📸 Capturing...');
                    try {
                        const shot = await html2canvas(target, { scale, useCORS: true, logging: false });
                        result = shot.toDataURL('image/jpeg', 0.85).split(',')[1];
                    } finally {
                        setStatus(prevStatus);
                    }
                }

                // Canvas only — fastest
                else {
                    const { width: w, height: h } = container.getBoundingClientRect();
                    const scale = Math.min(1, MAX / Math.max(w, h));
                    const tmp = document.createElement('canvas');
                    tmp.width = Math.round(w * scale);
                    tmp.height = Math.round(h * scale);
                    tmp.getContext('2d').drawImage(canvas, 0, 0, tmp.width, tmp.height);
                    result = tmp.toDataURL('image/jpeg', 0.85).split(',')[1];
                }

                _debugShowCapture(result);
                return result;
            } catch (e) {
                console.warn('Vision capture failed:', e);
                if (_displayStream) { _displayStream.getTracks().forEach(t => t.stop()); _displayStream = null; }
                return null;
            }
        }

                // Immediate first retry, then 1s for 10s, then exponential backoff
                let delay;
                if (_retryCount === 0) delay = 0;
                else if (_retryCount <= 10) delay = 1000;
                else delay = Math.min(1000 * Math.pow(2, _retryCount - 10), 30000);
                _retryTimer = setTimeout(connect, delay);
                _retryCount++;
            }
            function connect() {
                if (_relayGeneration !== gen) return;
                try {
                    _relayWs = new WebSocket(url);
                } catch (e) { scheduleReconnect(); return; }
                _relayWs.onopen = () => {
                    _relayConnected = true;
                    _retryCount = 0;
                    // Cancel pending disconnect notification — silent reconnect
                    clearTimeout(_disconnectNotifyTimer);
                    _disconnectNotifyTimer = null;
                    // Reset all devices to offline — relay will push true status
                    if (settings.devices) {
                        Object.values(settings.devices).forEach(d => d.online = false);
                    }
                    _relayWs.send(JSON.stringify({ type: 'browser_hello', instance_id: INSTANCE_ID }));
                    renderDeviceList();
                    startHeartbeat();
                };
                _relayWs.onmessage = (e) => {
                    try {
                        const msg = JSON.parse(e.data);
                        if (msg.type === 'pong') { clearTimeout(_relayPongTimer); return; }
                        handleRelayMessage(msg);
                    } catch (_) {}
                };
                _relayWs.onclose = () => {
                    _relayConnected = false;
                    stopHeartbeat();
                    const hadOnline = settings.devices && Object.values(settings.devices).some(d => d.online && !d.hidden);
                    if (settings.devices) Object.values(settings.devices).forEach(d => d.online = false);
                    // Auto takeover if host device is now unreachable
                    if (settings.hostDevice !== 'this browser') {
                        console.log(`[relay] Relay lost, taking over from ${settings.hostDevice}`);
                        settings.hostDevice = 'this browser';
                        saveSettingsToStorage(settings);
                        setStatus('Ready');
                    }
                    renderDeviceList();
                    // Delay notification 3s — give silent reconnect a chance
                    if (hadOnline && !_disconnectNotifyTimer) {
                        _disconnectNotifyTimer = setTimeout(() => {
                            if (!_relayConnected) {
                                appendMsgUI('system', 'System - [Relay] - Connection lost. Reconnecting...');
                            }
                            _disconnectNotifyTimer = null;
                        }, 10000);
                    }
                    scheduleReconnect();
                };
                _relayWs.onerror = () => { _relayWs.close(); };
            }
            function startHeartbeat() {
                stopHeartbeat();
                _relayPingTimer = setInterval(() => {
                    if (!_relayWs || _relayWs.readyState !== WebSocket.OPEN) return;
                    _relayWs.send(JSON.stringify({ type: 'ping' }));
                    _relayPongTimer = setTimeout(() => {
                        console.warn('[relay] Pong timeout, reconnecting...');
                        _relayWs.close();
                    }, 5000);
                }, 15000);
            }
            function stopHeartbeat() {
                clearInterval(_relayPingTimer);
                clearTimeout(_relayPongTimer);
            }
            // Network event listeners — instant reconnect on network recovery
            window.addEventListener('online', () => {
                if (!_relayConnected) {
                    console.log('[relay] Network online, reconnecting immediately');
                    _retryCount = 0;
                    scheduleReconnect();
                }
            });
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    if (!_relayWs || _relayWs.readyState !== WebSocket.OPEN) {
                        console.log('[relay] Tab visible, reconnecting');
                        _retryCount = 0;
                        scheduleReconnect();
                    } else {
                        // Connection looks alive? Ping to verify (catch zombie connections)
                        try { _relayWs.send(JSON.stringify({ type: 'ping' })); } catch { _relayWs.close(); }
                    }
                }
            });
            connect();
        }

                const ecKeyPair = await crypto.subtle.generateKey(
                    { name: 'ECDH', namedCurve: 'P-256' }, true, ['deriveBits']

        async function importDeviceKey(keyB64) {
            // urlsafe base64 → standard base64
            const std = keyB64.replace(/-/g, '+').replace(/_/g, '/');
            const pad = std.length % 4 ? std + '===='.slice(std.length % 4) : std;
            const raw = Uint8Array.from(atob(pad), c => c.charCodeAt(0));
            return crypto.subtle.importKey('raw', raw, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
        }

        async function encryptPayload(cryptoKey, plainObj) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encoded = new TextEncoder().encode(JSON.stringify(plainObj));
            const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, cryptoKey, encoded);
            const combined = new Uint8Array(12 + ct.byteLength);
            combined.set(iv);
            combined.set(new Uint8Array(ct), 12);
            let binary = '';
            for (let i = 0; i < combined.length; i++) binary += String.fromCharCode(combined[i]);
            return btoa(binary);
        }

        async function decryptPayload(cryptoKey, payloadB64) {
            const raw = Uint8Array.from(atob(payloadB64), c => c.charCodeAt(0));
            const iv = raw.slice(0, 12);
            const ct = raw.slice(12);
            const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, cryptoKey, ct);
            return JSON.parse(new TextDecoder().decode(plain));
        }

        // Gunzip helper (uses native DecompressionStream)
        async function gunzip(uint8) {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            writer.write(uint8);
            writer.close();
            const reader = ds.readable.getReader();
            const parts = [];
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                parts.push(value);
            }
            const total = parts.reduce((s, p) => s + p.length, 0);
            const result = new Uint8Array(total);
            let offset = 0;
            for (const p of parts) { result.set(p, offset); offset += p.length; }
            return new TextDecoder().decode(result);
        }

        // Reassemble chunked consciousness_sync response
        const _syncChunks = {};  // keyed by being_id
        async function handleSyncChunk(msg, cryptoKey) {
            const data = await decryptPayload(cryptoKey, msg.payload);
            // Legacy: non-chunked response (has 'consciousness' directly)
            if (data.consciousness !== undefined) return data;
            // Chunked: has gz, i, n
            const key = msg.being_id || '_';
            if (!_syncChunks[key]) _syncChunks[key] = [];
            _syncChunks[key][data.i] = Uint8Array.from(atob(data.gz), c => c.charCodeAt(0));
            if (_syncChunks[key].filter(Boolean).length < data.n) return null;  // waiting for more
            // All chunks received — reassemble
            const totalLen = _syncChunks[key].reduce((s, c) => s + c.length, 0);
            const full = new Uint8Array(totalLen);
            let off = 0;
            for (const c of _syncChunks[key]) { full.set(c, off); off += c.length; }
            delete _syncChunks[key];
            const json = await gunzip(full);
            return JSON.parse(json);
        }

        let _bip39 = null;
        async function _loadBip39() {
            if (_bip39) return _bip39;
            try {
                const relayHttp = settings.relayHost
                    ? (settings.relayHost.includes('://') ? settings.relayHost.replace(/\/$/, '') : `http://${settings.relayHost}:8080`)
                    : (settings.relayUrl || SETTINGS_DEFAULTS.relayUrl)
                        .replace('wss://', 'https://').replace('ws://', 'http://').replace(/\/ws$/, '');
                const res = await fetch(`${relayHttp}/bip39`);
                if (res.ok) _bip39 = (await res.text()).trim().split(/\s+/);
            } catch (_) {}
            return _bip39;
        }

        function agentLogHint(device_name) {
            const os = settings.devices?.[device_name]?.os || '';
            const logPath = os === 'Windows'
                ? '%APPDATA%\\infero\\agent.log'
                : os === 'macOS' ? '~/.infero/agent.log'
                : os === 'Linux' ? '~/.infero/agent.log'
                : '~/.infero/agent.log  (or %APPDATA%\\infero\\agent.log on Windows)';
            return `Check shell output or \`${logPath}\` on the device — verify words must match.`;
        }

        async function pairVerifyWords(keyB64) {
            const words = await _loadBip39();
            if (!words || words.length < 2048) return '(wordlist unavailable)';
            const keyBytes = Uint8Array.from(atob(keyB64), c => c.charCodeAt(0));
            const hash = new Uint8Array(await crypto.subtle.digest('SHA-256', keyBytes));
            const n = (hash[0] << 14) | (hash[1] << 6) | (hash[2] >> 2);
            return words[n >> 11] + ' ' + words[n & 0x7ff];
        }

        async function relayEncSend(deviceName, type, content) {
            const info = settings.devices?.[deviceName];
            if (!info?.keyB64 || !_relayWs || !_relayConnected) return;
            const cryptoKey = await importDeviceKey(info.keyB64);
            const payload = await encryptPayload(cryptoKey, content);
            _relayWs.send(JSON.stringify({ type, device_name: deviceName, payload }));
        }

        async function relayEncBroadcast(type, content) {
            if (!_relayWs || !_relayConnected) return;
            for (const [name, info] of Object.entries(settings.devices || {})) {
                if (info.online) await relayEncSend(name, type, content);
            }
        }

        async function relayDec(msg) {
            const sender = msg.sender || msg.device_name;
            const info = settings.devices?.[sender];
            if (!info?.keyB64) return null;
            try {
                const cryptoKey = await importDeviceKey(info.keyB64);
                return { sender, content: await decryptPayload(cryptoKey, msg.payload) };
            } catch { return null; }
        }

        async function deriveSharedKey(browserPrivateKey, devicePubB64) {
            const raw = Uint8Array.from(atob(devicePubB64), c => c.charCodeAt(0));
            const devicePub = await crypto.subtle.importKey(
                'raw', raw, { name: 'ECDH', namedCurve: 'P-256' }, false, []
            );
            const sharedBits = await crypto.subtle.deriveBits(
                { name: 'ECDH', public: devicePub }, browserPrivateKey, 256
            );
            const hkdfKey = await crypto.subtle.importKey('raw', sharedBits, 'HKDF', false, ['deriveKey']);
            const aesKey = await crypto.subtle.deriveKey(
                { name: 'HKDF', hash: 'SHA-256', salt: new Uint8Array(0),
                  info: new TextEncoder().encode('infero-device-relay-v1') },
                hkdfKey, { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']
            );
            const keyRaw = await crypto.subtle.exportKey('raw', aesKey);
            return btoa(String.fromCharCode(...new Uint8Array(keyRaw)));
        }

                if (online && msg.fresh_pair && msg.device_pub && window._pendingPairKey) {
                    // Fresh pair: device derived its key from THIS browser_pub → ECDH keys match
                    const keyB64 = await deriveSharedKey(window._pendingPairKey.privateKey, msg.device_pub);
                    settings.devices[device_name] = { keyB64, online: true, type: msg.device_type || 'shell', os: msg.device_os || '' };
                    window._pendingPairKey = null;
                    sessionStorage.removeItem('_pairPendingJwk');

                    _pairModalCloseTimer = setTimeout(() => { _pairModalCloseTimer = null; closePairModal(); }, 2000);

                    settings.devices[device_name].online = online;
                    if (msg.device_type) settings.devices[device_name].type = msg.device_type;
                    if (wasOnline === online) {
                        // status unchanged (reconnect noise) — update UI only, skip consciousness
                        console.log(`[relay] device_status EARLY RETURN: wasOnline===online===${online} for ${device_name}`);
                        saveSettingsToStorage(settings);
                        renderDeviceList();
                        return;
                    }
                    if (msg.device_os) settings.devices[device_name].os = msg.device_os;
